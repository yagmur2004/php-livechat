version: '3.8'

services:
  websocket-server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/vendor
    environment:
      - DB_HOST=db
      - DB_NAME=php_livechat
      - DB_USER=root
      - DB_PASS=rootpassword
    depends_on:
      - db
    # Enes'in sunucusunun da MySQL ile konuşabilmesi için sürücüleri yükleyen sihirli komut
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && php bin/server.php"

  # PHP ve Apache barındıran, Sami'nin login/register kodlarını çalıştıran ana sunucu
  test-ui:
    image: php:8.2-apache
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=php_livechat
      - DB_USER=root
      - DB_PASS=rootpassword
    depends_on:
      - db
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"

  # Yağmur'un tasarladığı tabloları tutacak olan Docker içi MySQL veritabanımız
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: php_livechat
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql